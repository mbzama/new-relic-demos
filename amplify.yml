version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd vite-reactjs && npm install
    build:
      commands:
        - cd vite-reactjs && npm run build
  artifacts:
    baseDirectory: vite-reactjs/dist
    files:
      - '**/*'
  cache:
    paths:
      - vite-reactjs/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: no-store
