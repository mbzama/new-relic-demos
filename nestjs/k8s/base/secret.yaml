# Run: kubectl create secret generic newrelic-secret \
#        --from-literal=license-key=YOUR_NEW_RELIC_LICENSE_KEY
#
# Or apply this manifest after base64-encoding your key:
#   echo -n 'YOUR_KEY' | base64
apiVersion: v1
kind: Secret
metadata:
  name: newrelic-secret
  namespace: default
type: Opaque
data:
  # Replace with: echo -n 'your-license-key' | base64
  license-key: eW91ci1saWNlbnNlLWtleS1oZXJl
