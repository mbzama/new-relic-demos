apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-newrelic-demo
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api
          env:
            - name: NODE_ENV
              value: qa
            - name: NEW_RELIC_APP_NAME
              value: NestJS-Demo-QA
            - name: NEW_RELIC_LOG_LEVEL
              value: info
